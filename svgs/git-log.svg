<svg viewBox="0 0 700 230" xmlns="http://www.w3.org/2000/svg" width="700">
  <rect width="700" height="230" rx="10" fill="#0d1117"/>

  <!-- titlebar -->
  <circle cx="22" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="5" fill="#febc2e"/>
  <circle cx="58" cy="18" r="5" fill="#28c840"/>
  <text x="280" y="22" font-family="'JetBrains Mono', monospace" font-size="11" fill="#475569">git log --oneline</text>
  <line x1="14" y1="30" x2="686" y2="30" stroke="#1e293b" stroke-width="1"/>

  <!-- prompt -->
  <text x="20" y="54" font-family="'JetBrains Mono', monospace" font-size="12" fill="#475569">~</text>
  <text x="34" y="54" font-family="'JetBrains Mono', monospace" font-size="12" fill="#64748b">$</text>
  <text x="48" y="54" font-family="'JetBrains Mono', monospace" font-size="12" fill="#2dd4bf">git log --oneline --all</text>

  <!-- commit 1 — GSoC connector -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.4s" fill="freeze"/>
    <text x="20" y="76" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f97316">d4e1a9f</text>
    <text x="95" y="76" font-family="'JetBrains Mono', monospace" font-size="12" fill="#64748b">(</text>
    <text x="103" y="76" font-family="'JetBrains Mono', monospace" font-size="12" fill="#2dd4bf">HEAD</text>
    <text x="135" y="76" font-family="'JetBrains Mono', monospace" font-size="12" fill="#64748b">-> main)</text>
    <text x="196" y="76" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">feat: STA harvester + STAC transformer, GSoC @ OSGeo</text>
  </g>

  <!-- commit 2 — DCAT-AP -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.7s" fill="freeze"/>
    <text x="20" y="96" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f97316">c7b82e3</text>
    <text x="95" y="96" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">feat: DCAT-AP 3.0 serializer with JSON-LD + pySHACL</text>
  </g>

  <!-- commit 3 — istSOS4 PRs -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.0s" fill="freeze"/>
    <text x="20" y="116" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f97316">a91f04c</text>
    <text x="95" y="116" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">fix: @iot.nextLink omission + observedArea on Thing</text>
  </g>

  <!-- commit 4 — QRSLB -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.3s" fill="freeze"/>
    <text x="20" y="136" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f97316">7b12d4a</text>
    <text x="95" y="136" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">fix: WebRTC race condition on peer_joined in QRSLB</text>
  </g>

  <!-- commit 5 — DVS-Asia -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.6s" fill="freeze"/>
    <text x="20" y="156" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f97316">91be3dc</text>
    <text x="95" y="156" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">feat: multi-source dedup pipeline, DVS-Asia</text>
  </g>

  <!-- commit 6 — init -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.9s" fill="freeze"/>
    <text x="20" y="176" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f97316">5f203b8</text>
    <text x="95" y="176" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">init: backend engineer, building things that move data</text>
  </g>

  <!-- blinking cursor -->
  <rect x="20" y="185" width="7" height="13" fill="#2dd4bf" rx="1" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" dur="0.3s" begin="2.2s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="2.5s" repeatCount="indefinite"/>
  </rect>
</svg>