<svg viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg" width="700" shape-rendering="crispEdges">
  <defs>
    <clipPath id="ppc">
      <rect x="0" y="0" width="700" height="560" rx="0"/>
    </clipPath>
    <!-- Pixel font simulation via monospace -->
