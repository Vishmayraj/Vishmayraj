  <rect x="12" y="12" width="20" height="3" fill="#2dd4bf" opacity="0.6"/>
  <!-- Top-right L bracket -->
  <rect x="685" y="12" width="3" height="20" fill="#2dd4bf" opacity="0.6"/>
  <rect x="665" y="12" width="20" height="3" fill="#2dd4bf" opacity="0.6"/>
  <!-- Bottom-left L bracket -->
  <rect x="12" y="525" width="3" height="20" fill="#2dd4bf" opacity="0.6"/>
  <rect x="12" y="545" width="20" height="3" fill="#2dd4bf" opacity="0.6"/>
  <!-- Bottom-right L bracket -->
